---
# CrateDigger — local development stack
# Airflow + Postgres only for now. Spark comes in Step 4.
#
# Usage:
#   docker compose up          — start everything
#   docker compose down        — stop everything (data preserved)
#   docker compose down -v     — stop + delete all data (fresh start)

x-airflow-common: &airflow-common
  # Use our custom image (official Airflow + our requirements.txt)
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment:
    # Tell Airflow to use Postgres instead of the default SQLite
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # The executor determines how tasks run.
    # LocalExecutor = tasks run as subprocesses on the same machine.
    # Good enough for local dev; production would use CeleryExecutor or KubernetesExecutor.
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Fernet key encrypts sensitive values (API keys, passwords) stored in the Airflow DB
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__SECRET_KEY: ${AIRFLOW__CORE__SECRET_KEY}
    # Disable the example DAGs that ship with Airflow — we don't need the noise
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # Pass our API credentials into the Airflow environment
    SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
    SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    LASTFM_API_KEY: ${LASTFM_API_KEY}
    LASTFM_API_SECRET: ${LASTFM_API_SECRET}
  volumes:
    # Mount local folders into the container so changes are reflected immediately
    # without rebuilding the image
    - ./dags:/opt/airflow/dags          # DAGs we write show up instantly
    - ./logs:/opt/airflow/logs          # Logs written by Airflow land here locally
    - ./spark_jobs:/opt/airflow/spark_jobs
    - ./cratedigger:/opt/airflow/cratedigger  # Our Python package
  depends_on:
    postgres:
      condition: service_healthy        # Don't start until Postgres is ready
  user: "${AIRFLOW_UID}:0"

services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"                     # Expose so you can connect with DBeaver/psql
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persist data between restarts
      - ./sql:/docker-entrypoint-initdb.d        # Any .sql files here run on first start
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow init ──────────────────────────────────────────────────────────
  # This is a one-shot service — it runs once to set up the DB, then exits.
  # Docker marks it as "completed", which is expected and fine.
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname CrateDigger
          --lastname Admin
          --role Admin
          --email admin@cratedigger.local
      "
    restart: "no"

  # ── Airflow scheduler ─────────────────────────────────────────────────────
  # Watches the dags/ folder, parses DAG files, and triggers task runs
  # on schedule. The brain of Airflow — nothing runs without it.
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow webserver ─────────────────────────────────────────────────────
  # The UI. Visit http://localhost:8080 once this is running.
  # Login: admin / admin
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:    # Named volume — Docker manages this, data survives container restarts
